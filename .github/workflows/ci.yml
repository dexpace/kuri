name: CI

# Runs the full test suite for every kuri target on the host arch that can actually
# execute it: JVM on Linux x64; JS (Node + browser) and Wasm/JS (Node + browser) on
# Linux x64; Kotlin/Native executed on Linux x64 (linuxX64), Windows x64 (mingwX64) and
# macOS arm64 (the macOS host target plus the arm64 iOS/tvOS/watchOS simulators). Targets
# no hosted runner can execute — linuxArm64 and the Apple device targets
# (iosArm64/tvosArm64/watchosArm64), for which Kotlin/Native has no host of that arch, and
# the x86_64 iOS simulator (disabled by Kotlin/Native on an arm64 host) — are cross-
# compiled and linked so target-specific build breaks are still caught. The first job
# also carries the host-agnostic quality gates — ktlint, detekt, the binary-compat API
# check and the JVM coverage floor — so they run once, not per arch.

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

# A newer push to the same ref cancels an in-flight run instead of queueing behind it —
# except on `main`, where each push is allowed to finish so every commit on the default
# branch keeps its own full, recorded result rather than only the latest surviving.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

defaults:
  run:
    # Git Bash is present on the Windows runner too, so `./gradlew …` is written once
    # and works uniformly across Linux, macOS and Windows.
    shell: bash

env:
  GRADLE_OPTS: -Dorg.gradle.console=plain

jobs:
  static-analysis:
    name: Quality gate · JVM tests (Linux x64)
    runs-on: ubuntu-latest
    # Bound the run so a hung test or stuck daemon fails fast instead of burning the
    # 6-hour default; generous over the real ~few-minute runtime.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          # Matches the module's jvmToolchain(21); running Gradle on 21 means no separate
          # toolchain JDK has to be provisioned (there is no foojay resolver configured).
          distribution: corretto
          java-version: '21'
      # Default (Enhanced Caching, gradle-actions-caching): free for public repos, no extra config
      # needed, and it caches GRADLE_USER_HOME (dependencies, wrapper distributions, build cache).
      - uses: gradle/actions/setup-gradle@v6
      # Restore the Kotlin/Native toolchain (~1 GB: compiler bundle + LLVM/sysroot/gcc deps under
      # ~/.konan). setup-gradle caches ~/.gradle but not ~/.konan, and apiCheck's KLIB ABI validation
      # compiles every native klib here, so without this the whole bundle re-downloads each run.
      # The key is scoped `-gate-` (the native job below uses `-native-`) because the two Linux jobs
      # populate different ~/.konan subsets: this job's apiCheck cross-builds the mingw klib for the ABI
      # dump, which the `-native-` leg (linuxX64/linuxArm64 only) never pulls. Separate keys let each job
      # cache exactly its own subset instead of a shared write-once key locking the cache to whichever
      # subset landed first. Restore runs on every branch (PRs reuse main's cache); only main writes it
      # (see the save step below). The key tracks the version catalog; restore-keys give a partial hit
      # when it changes.
      - name: Restore Kotlin/Native toolchain
        id: konan-cache
        uses: actions/cache/restore@v6
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-gate-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-konan-gate-
      # Gradle's configuration cache lives in the checkout (.gradle/configuration-cache), not
      # GRADLE_USER_HOME, so setup-gradle's default cache never covers it (see the `native` job
      # for the full rationale). Scoped `-gate-` since this job's task set (ktlint/detekt/apiCheck/
      # jvmTest/koverVerify) differs from the other Linux jobs' entries.
      - name: Restore Gradle configuration cache
        id: configcache-cache
        uses: actions/cache/restore@v6
        with:
          path: .gradle/configuration-cache
          key: ${{ runner.os }}-configcache-gate-${{ hashFiles('**/*.gradle.kts', 'gradle.properties', 'gradle/libs.versions.toml', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-configcache-gate-
      - name: ktlint, detekt, binary-compatibility and JVM coverage floor
        # koverVerify pulls in jvmTest and enforces the 80% line-coverage rule. Piped through
        # tee/grep (pipefail is on by default for `shell: bash`, so a gradlew failure still
        # fails the step) to surface Gradle's own configuration-cache hit/miss line in the job
        # summary — otherwise confirming the cache above is doing anything means digging
        # through the raw --stacktrace log by hand.
        run: |
          ./gradlew ktlintCheck detekt apiCheck jvmTest koverVerify --stacktrace | tee build.log
          echo "**Configuration cache:** $(grep -m1 -E 'Reusing configuration cache|Calculating task graph' build.log || echo 'signal not found')" >> "$GITHUB_STEP_SUMMARY"
      # Write the toolchain cache only from main, and only when the restore was not an exact hit
      # (GitHub caches are write-once per key). PRs never write, so parallel branches can't evict
      # main's warm cache.
      - name: Save Kotlin/Native toolchain
        if: github.ref == 'refs/heads/main' && steps.konan-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-gate-${{ hashFiles('gradle/libs.versions.toml') }}
      - name: Save Gradle configuration cache
        if: github.ref == 'refs/heads/main' && steps.configcache-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: .gradle/configuration-cache
          key: ${{ runner.os }}-configcache-gate-${{ hashFiles('**/*.gradle.kts', 'gradle.properties', 'gradle/libs.versions.toml', 'gradle/wrapper/gradle-wrapper.properties') }}

  web:
    name: JS · Wasm tests (Linux x64)
    runs-on: ubuntu-latest
    # A wedged headless-Chrome/Karma run can hang indefinitely; cap it well above the
    # real runtime so only a genuine hang trips the limit.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: '21'
      # Default (Enhanced Caching, gradle-actions-caching): free for public repos, no extra config
      # needed, and it caches GRADLE_USER_HOME (dependencies, wrapper distributions, build cache).
      - uses: gradle/actions/setup-gradle@v6
      # Gradle's configuration cache lives in the checkout (.gradle/configuration-cache), not
      # GRADLE_USER_HOME, so setup-gradle's default cache never covers it (see the `native` job
      # for the full rationale). Scoped `-web-` since this job's task set (jsTest/wasmJsTest)
      # differs from the other Linux jobs' entries.
      - name: Restore Gradle configuration cache
        id: configcache-cache
        uses: actions/cache/restore@v6
        with:
          path: .gradle/configuration-cache
          key: ${{ runner.os }}-configcache-web-${{ hashFiles('**/*.gradle.kts', 'gradle.properties', 'gradle/libs.versions.toml', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-configcache-web-
      - name: JS (Node + browser) and Wasm/JS (Node + browser) tests
        # jsTest / wasmJsTest each aggregate their Node and Karma/ChromeHeadless browser
        # runs; ubuntu-latest ships google-chrome-stable, which Karma auto-detects. Piped
        # through tee/grep to surface Gradle's configuration-cache hit/miss line in the job
        # summary (see the static-analysis job for why).
        run: |
          ./gradlew jsTest wasmJsTest --stacktrace | tee build.log
          echo "**Configuration cache:** $(grep -m1 -E 'Reusing configuration cache|Calculating task graph' build.log || echo 'signal not found')" >> "$GITHUB_STEP_SUMMARY"
      # Write only from main, and only on a non-exact restore (GitHub caches are write-once per
      # key), so PR legs never evict main's warm cache.
      - name: Save Gradle configuration cache
        if: github.ref == 'refs/heads/main' && steps.configcache-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: .gradle/configuration-cache
          key: ${{ runner.os }}-configcache-web-${{ hashFiles('**/*.gradle.kts', 'gradle.properties', 'gradle/libs.versions.toml', 'gradle/wrapper/gradle-wrapper.properties') }}

  native:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    # Highest ceiling of the jobs: the macOS leg cold-downloads the Kotlin/Native
    # toolchain and boots several simulators, but this still bounds a hang far under 6h.
    timeout-minutes: 45
    strategy:
      # Report every arch's result even when one fails, so a single red target does not
      # mask the others.
      fail-fast: false
      matrix:
        include:
          # linuxX64 runs its tests; linuxArm64 has no arm64-Linux Kotlin/Native host, so
          # it is cross-compiled and linked from the x64 host to still catch build breaks.
          - name: Native · Linux (x64 host)
            os: ubuntu-latest
            tasks: linuxX64Test linuxArm64TestBinaries
          - name: Native · Windows x64
            os: windows-latest
            tasks: mingwX64Test
          - name: Native · Apple (macOS arm64)
            os: macos-latest
            # The macOS host target and the arm64 iOS/tvOS/watchOS simulators run the full
            # suite (macos-latest ships those simulator runtimes). Targets no runner can
            # execute — the device targets (iosArm64/tvosArm64/watchosArm64) and the x86_64
            # iOS simulator (iosX64: disabled by Kotlin/Native on an arm64 host, and GitHub no
            # longer offers Intel macOS runners) — are compiled and linked via *TestBinaries.
            # klibApiCheck runs here too: it re-verifies the Apple klib targets' ABI against the
            # committed dump. The Linux quality-gate job can only *infer* those targets from the
            # merged dump (it can't build them), so macOS is the only host that catches an Apple
            # ABI break — or a dump accidentally regenerated on Linux/Windows, which silently
            # drops the Apple targets. (The klib merge also cross-builds the non-Apple klibs on
            # this host; those are redundant with the Linux gate but cheap.)
            tasks: >-
              macosArm64Test
              iosSimulatorArm64Test
              tvosSimulatorArm64Test
              watchosSimulatorArm64Test
              iosX64TestBinaries
              iosArm64TestBinaries
              tvosArm64TestBinaries
              watchosArm64TestBinaries
              klibApiCheck
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: '21'
      # Default (Enhanced Caching, gradle-actions-caching): free for public repos, no extra config
      # needed, and it caches GRADLE_USER_HOME (dependencies, wrapper distributions, build cache).
      - uses: gradle/actions/setup-gradle@v6
      # Restore the Kotlin/Native toolchain (~1 GB under ~/.konan) that this native job compiles and
      # links against; setup-gradle caches ~/.gradle but not ~/.konan. runner.os in the key keeps the
      # Linux/Windows/macOS legs separate, and the `-native-` scope keeps the Linux leg's smaller
      # toolchain subset (linuxX64/linuxArm64) from sharing a key with the quality-gate job's broader
      # `-gate-` cache, which also cross-builds the mingw klib for the ABI dump. Restore runs on every
      # branch; only main writes it.
      - name: Restore Kotlin/Native toolchain
        id: konan-cache
        uses: actions/cache/restore@v6
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-native-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-konan-native-
      # Gradle's configuration cache lives in the checkout (.gradle/configuration-cache), not
      # GRADLE_USER_HOME, so setup-gradle's default cache never covers it — every run pays full
      # task-graph calculation ("Calculating task graph as no cached configuration is available")
      # regardless of the toolchain cache above. A configuration-cache entry only depends on build
      # scripts/properties, not application sources, so seeding it from main still hits for PRs
      # that only change .kt files. Scoped `-native-` (this job's task set) and by runner.os
      # (absolute paths differ per host); the key tracks the files that actually invalidate an
      # entry, with a restore-key fallback for a partial hit when they change.
      - name: Restore Gradle configuration cache
        id: configcache-cache
        uses: actions/cache/restore@v6
        with:
          path: .gradle/configuration-cache
          key: ${{ runner.os }}-configcache-native-${{ hashFiles('**/*.gradle.kts', 'gradle.properties', 'gradle/libs.versions.toml', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-configcache-native-
      - name: ${{ matrix.name }}
        # Piped through tee/grep to surface Gradle's configuration-cache hit/miss line in the
        # job summary (see the static-analysis job for why).
        run: |
          ./gradlew ${{ matrix.tasks }} --stacktrace | tee build.log
          echo "**Configuration cache:** $(grep -m1 -E 'Reusing configuration cache|Calculating task graph' build.log || echo 'signal not found')" >> "$GITHUB_STEP_SUMMARY"
      # Write the toolchain cache only from main, and only on a non-exact restore (caches are
      # write-once per key), so PR legs never evict main's warm per-OS cache.
      - name: Save Kotlin/Native toolchain
        if: github.ref == 'refs/heads/main' && steps.konan-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-native-${{ hashFiles('gradle/libs.versions.toml') }}
      - name: Save Gradle configuration cache
        if: github.ref == 'refs/heads/main' && steps.configcache-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: .gradle/configuration-cache
          key: ${{ runner.os }}-configcache-native-${{ hashFiles('**/*.gradle.kts', 'gradle.properties', 'gradle/libs.versions.toml', 'gradle/wrapper/gradle-wrapper.properties') }}

  android-unit:
    name: Android unit tests (Linux x64)
    runs-on: ubuntu-latest
    # Host-side JVM tests; same generous bound as the other Linux JVM job.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: '21'
      # Default (Enhanced Caching, gradle-actions-caching): free for public repos, no extra config
      # needed, and it caches GRADLE_USER_HOME (dependencies, wrapper distributions, build cache).
      - uses: gradle/actions/setup-gradle@v6
      - name: Android host (JVM) unit tests
        # Runs commonTest compiled for the Android target on the JVM — no emulator.
        run: ./gradlew :kuri:testAndroidHostTest --stacktrace

  android-instrumented:
    name: Android instrumented tests (emulator)
    runs-on: ubuntu-latest
    # Emulator setup (system-image download, AVD create, boot) dominates; bound it so a
    # wedged or never-booting emulator fails fast instead of hanging to the 6-hour default.
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: '21'
      # Default (Enhanced Caching, gradle-actions-caching): free for public repos, no extra config
      # needed, and it caches GRADLE_USER_HOME (dependencies, wrapper distributions, build cache).
      - uses: gradle/actions/setup-gradle@v6
      # Hardware acceleration for the emulator; required for a reliable boot on hosted runners.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      # Restore the cached AVD (the created device plus its boot snapshot) under ~/.android so a run can
      # skip AVD creation and the cold boot and load a warm snapshot instead. This does not cache the
      # system-image package itself — sdkmanager installs that under $ANDROID_SDK_ROOT/system-images,
      # outside ~/.android — so the emulator action still ensures the image is present each run.
      # Restore runs on every branch (PRs reuse main's snapshot); only main writes it (see save below).
      # The key pins every coordinate that affects the snapshot; bump the -v suffix if the emulator
      # options change, since GitHub caches are write-once per key.
      - name: Restore AVD snapshot
        id: avd-cache
        uses: actions/cache/restore@v6
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-30-aosp_atd-x86_64-pixel6-v1
      # On main with no cached snapshot, boot once to create the AVD and write a clean boot snapshot
      # for the cache. Emulator options match the test run so the snapshot stays valid. Gated to main
      # because only main persists it — PRs skip this create-and-snapshot step and run the test step
      # below once, warm-booting from main's cached snapshot when present (a single boot, not two).
      - name: Create AVD and generate snapshot for caching
        if: github.ref == 'refs/heads/main' && steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d # v2.38.0
        with:
          api-level: 30
          target: aosp_atd
          arch: x86_64
          profile: pixel_6
          force-avd-creation: false
          disable-animations: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          script: echo "Generated AVD snapshot for caching."
      - name: Android instrumented tests on an emulator
        uses: reactivecircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d # v2.38.0
        with:
          api-level: 30
          target: aosp_atd
          arch: x86_64
          profile: pixel_6
          force-avd-creation: false
          disable-animations: true
          # -no-snapshot-save: boot from the cached snapshot but don't rewrite it on exit.
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot-save -camera-back none
          # Installs and runs the androidDeviceTest instrumentation (an ART smoke test) on the emulator.
          script: ./gradlew :kuri:connectedAndroidDeviceTest --stacktrace
      # Persist the AVD snapshot for later runs — only from main, and only on a non-exact restore.
      - name: Save AVD snapshot
        if: github.ref == 'refs/heads/main' && steps.avd-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-30-aosp_atd-x86_64-pixel6-v1

  # Aggregate gate: a single check to require in branch protection. Green only when every
  # job above succeeded; fails if any was skipped, cancelled or failed.
  ci:
    name: CI
    if: always()
    needs: [ static-analysis, web, native, android-unit, android-instrumented ]
    runs-on: ubuntu-latest
    # Only evaluates the aggregate result; a couple of minutes is ample.
    timeout-minutes: 5
    steps:
      - name: Fail if any job did not succeed
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'skipped') }}
        run: |
          echo "One or more CI jobs did not succeed: ${{ join(needs.*.result, ', ') }}"
          exit 1
