name: CI

# Runs the full test suite for every kuri target on the host arch that can actually
# execute it: JVM on Linux x64; JS (Node + browser) and Wasm/JS (Node + browser) on
# Linux x64; Kotlin/Native executed on Linux x64 (linuxX64), Windows x64 (mingwX64) and
# macOS arm64 (the macOS host target plus the arm64 iOS/tvOS/watchOS simulators). Targets
# no hosted runner can execute — linuxArm64 and the Apple device targets
# (iosArm64/tvosArm64/watchosArm64), for which Kotlin/Native has no host of that arch, and
# the x86_64 iOS simulator (disabled by Kotlin/Native on an arm64 host) — are cross-
# compiled and linked so target-specific build breaks are still caught. The first job
# also carries the host-agnostic quality gates — ktlint, detekt, the binary-compat API
# check and the JVM coverage floor — so they run once, not per arch.

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

# A newer push to the same ref cancels an in-flight run instead of queueing behind it.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    # Git Bash is present on the Windows runner too, so `./gradlew …` is written once
    # and works uniformly across Linux, macOS and Windows.
    shell: bash

env:
  GRADLE_OPTS: -Dorg.gradle.console=plain

jobs:
  static-analysis:
    name: Quality gate · JVM tests (Linux x64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          # Matches the module's jvmToolchain(21); running Gradle on 21 means no separate
          # toolchain JDK has to be provisioned (there is no foojay resolver configured).
          distribution: corretto
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - name: ktlint, detekt, binary-compatibility and JVM coverage floor
        # koverVerify pulls in jvmTest and enforces the 80% line-coverage rule.
        run: ./gradlew ktlintCheck detekt apiCheck jvmTest koverVerify --stacktrace

  web:
    name: JS · Wasm tests (Linux x64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - name: JS (Node + browser) and Wasm/JS (Node + browser) tests
        # jsTest / wasmJsTest each aggregate their Node and Karma/ChromeHeadless browser
        # runs; ubuntu-latest ships google-chrome-stable, which Karma auto-detects.
        run: ./gradlew jsTest wasmJsTest --stacktrace

  native:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      # Report every arch's result even when one fails, so a single red target does not
      # mask the others.
      fail-fast: false
      matrix:
        include:
          # linuxX64 runs its tests; linuxArm64 has no arm64-Linux Kotlin/Native host, so
          # it is cross-compiled and linked from the x64 host to still catch build breaks.
          - name: Native · Linux (x64 host)
            os: ubuntu-latest
            tasks: linuxX64Test linuxArm64TestBinaries
          - name: Native · Windows x64
            os: windows-latest
            tasks: mingwX64Test
          - name: Native · Apple (macOS arm64)
            os: macos-latest
            # The macOS host target and the arm64 iOS/tvOS/watchOS simulators run the full
            # suite (macos-latest ships those simulator runtimes). The x86_64 iOS simulator
            # (iosX64) is disabled by Kotlin/Native on an arm64 host, and the device targets
            # (iosArm64/tvosArm64/watchosArm64) have no runner that can execute them — so all
            # four are compiled and linked via *TestBinaries to still catch build breaks.
            tasks: >-
              macosArm64Test
              iosSimulatorArm64Test
              tvosSimulatorArm64Test
              watchosSimulatorArm64Test
              iosX64TestBinaries
              iosArm64TestBinaries
              tvosArm64TestBinaries
              watchosArm64TestBinaries
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - name: ${{ matrix.name }}
        run: ./gradlew ${{ matrix.tasks }} --stacktrace

  # Aggregate gate: a single check to require in branch protection. Green only when every
  # job above succeeded; fails if any was skipped, cancelled or failed.
  ci:
    name: CI
    if: always()
    needs: [ static-analysis, web, native ]
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any job did not succeed
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'skipped') }}
        run: |
          echo "One or more CI jobs did not succeed: ${{ join(needs.*.result, ', ') }}"
          exit 1
